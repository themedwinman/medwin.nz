                  <li><strong>Pi-hole</strong>: DNS filtering for the home network.</li>

                A tidy setup for DNS filtering and reliable access to internal services — with

                <ul>
                  <li><strong>Pi-hole</strong> as a local DNS entry point.</li>
                  <li><strong>Caddy</strong> for automatic HTTPS and clean routing.</li>
                  <li><strong>Wildcard TLS</strong> so I can add subdomains without re-issuing certs manually.</li>
